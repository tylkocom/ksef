name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/validate_docs_frontmatter.py"
      - ".github/workflows/docs-check.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate_docs_frontmatter.py docs/
