name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: extractions/setup-just@v2

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: just sync

      - name: Release check
        run: just release-check

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  notify-docs:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch docs deployment
        env:
          DOCS_DISPATCH_TOKEN: ${{ secrets.DOCS_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DOCS_DISPATCH_TOKEN" ]; then
            echo "::notice::DOCS_DISPATCH_TOKEN is not configured; skipping docs deployment dispatch."
            exit 0
          fi

          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DOCS_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/stacking-hq/ksef2-docs/dispatches \
            -d "$(python - <<'PY'
          import json
          import os

          print(json.dumps({
              "event_type": "docs-updated",
              "client_payload": {
                  "product": "sdk",
                  "ref": os.environ["GITHUB_REF_NAME"],
                  "repository": os.environ["GITHUB_REPOSITORY"],
                  "sha": os.environ["GITHUB_SHA"],
              },
          }))
          PY
          )"
